name: GLMS CI-CD

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore GLMS-Part2.sln

      - name: Build
        run: dotnet build GLMS-Part2.sln --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test GLMS-Part2.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

  docker-validate:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker compose syntax
        run: docker compose -f docker-compose.yml config

      - name: Build API and Web images
        run: docker compose -f docker-compose.yml build glms-backend-api glms-frontend-web
