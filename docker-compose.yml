version: "3.9"

services:
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrong!Passw0rd", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 15

  glms-backend-api:
    build:
      context: .
      dockerfile: GLMS.Api/Dockerfile
    container_name: glms-backend-api
    depends_on:
      sql-server-db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DisableHttpsRedirection: "true"
      ConnectionStrings__DefaultConnection: "Server=sql-server-db,1433;Database=GLMSDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True"
      Jwt__Key: "GLMS-Part3-Development-Key-Use-Longer-Secret-In-Production-12345"
      Jwt__Issuer: "GLMS.Api"
      Jwt__Audience: "GLMS.Client"
      Jwt__Username: "glms-admin"
      Jwt__Password: "P@ssw0rd!"
    ports:
      - "8081:8080"

  glms-frontend-web:
    build:
      context: .
      dockerfile: GLMS.Web/Dockerfile
    container_name: glms-frontend-web
    depends_on:
      - glms-backend-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DisableHttpsRedirection: "true"
      BackendApi__BaseUrl: "http://glms-backend-api:8080/"
      BackendApi__Username: "glms-admin"
      BackendApi__Password: "P@ssw0rd!"
    ports:
      - "8080:8080"

volumes:
  sqlserver_data:
